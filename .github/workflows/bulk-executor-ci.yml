name: bulk_executor CI

on:
  push:
    branches: [fork-ci]
    paths:
      - 'tools/bulk_executor/**'
      - '.github/workflows/bulk-executor-ci.yml'
  pull_request:
    branches: [fork-ci]
    paths:
      - 'tools/bulk_executor/**'
      - '.github/workflows/bulk-executor-ci.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/bulk_executor

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -r tests/requirements-test.txt

      - name: Run unit tests
        run: |
          .venv/bin/pytest tests/ --ignore=tests/e2e -q --tb=short --cov=server/src --cov=client/src --cov-branch --cov-report=term-missing

  connector-smoke:
    name: Connector smoke (read-path)
    needs: unit-tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.repository == 'awslabs/amazon-dynamodb-tools' || github.repository == 'relentlesscol/amazon-dynamodb-tools')
    defaults:
      run:
        working-directory: tools/bulk_executor

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -r tests/requirements-test.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.E2E_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.E2E_AWS_REGION }}

      - name: Write e2e config
        env:
          E2E_ACCOUNT: ${{ secrets.E2E_AWS_ACCOUNT_ID }}
          E2E_REGION: ${{ secrets.E2E_AWS_REGION }}
          E2E_READ: ${{ secrets.E2E_READ_TABLE }}
          E2E_WRITE: ${{ secrets.E2E_WRITE_TABLE }}
        run: |
          printf '{"aws_account_id":"%s","aws_region":"%s","read_table":"%s","write_table":"%s","bootstrap_confirmed":true}\n' \
            "$E2E_ACCOUNT" "$E2E_REGION" "$E2E_READ" "$E2E_WRITE" > tests/e2e/.e2e-config

      - name: Run connector smoke
        run: |
          .venv/bin/pytest tests/e2e/connector/ -m e2e -q --tb=short -x --e2e-suite "connector smoke"

  command-e2e:
    name: Command e2e (write-path)
    needs: connector-smoke
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.repository == 'awslabs/amazon-dynamodb-tools' || github.repository == 'relentlesscol/amazon-dynamodb-tools')
    defaults:
      run:
        working-directory: tools/bulk_executor

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -r tests/requirements-test.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.E2E_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.E2E_AWS_REGION }}

      - name: Write e2e config
        env:
          E2E_ACCOUNT: ${{ secrets.E2E_AWS_ACCOUNT_ID }}
          E2E_REGION: ${{ secrets.E2E_AWS_REGION }}
          E2E_READ: ${{ secrets.E2E_READ_TABLE }}
          E2E_WRITE: ${{ secrets.E2E_WRITE_TABLE }}
        run: |
          printf '{"aws_account_id":"%s","aws_region":"%s","read_table":"%s","write_table":"%s","bootstrap_confirmed":true}\n' \
            "$E2E_ACCOUNT" "$E2E_REGION" "$E2E_READ" "$E2E_WRITE" > tests/e2e/.e2e-config

      - name: Run command e2e
        run: |
          .venv/bin/pytest tests/e2e/commands/ -m e2e -q --tb=short -x --e2e-suite "command e2e"
